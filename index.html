<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOA — IFRS Campus Rio Grande</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300843D'/><text y='.9em' font-size='70' x='15'>S</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ── Tela de loading ── -->
<div id="loading">
  <div class="logo-big">S</div>
  <div class="load-txt">SOA — IFRS Campus Rio Grande</div>
  <div class="load-sub" id="load-sub">Carregando dados...</div>
  <div class="spinner"></div>
</div>

<!-- ── Shell Admin ── -->
<div class="shell" id="shell-admin">
  <header class="hdr">
    <div class="hl">
      <div class="hlogo">S</div>
      <div><div class="hnm">SOA</div><div class="hcp">IFRS · Campus Rio Grande</div></div>
      <div class="hvd"></div>
      <nav class="hnav" id="admin-topnav">
        <button class="hni on"  data-page="editais">Editais</button>
        <button class="hni"     data-page="projetos">Ações</button>
        <button class="hni"     data-page="inscricoes">Inscrições</button>
        <button class="hni"     data-page="assiduidade">Assiduidade</button>
        <button class="hni"     data-page="logs">Auditoria</button>
      </nav>
    </div>
    <div class="hr">
      <div class="huser">
        <div class="hav" id="admin-av">AD</div>
        <div><div class="hun" id="admin-nome">Admin</div><div class="hperf">Administrador</div></div>
      </div>
    </div>
  </header>
  <div class="cbar">
    <div style="flex:2;background:var(--ensi)"></div>
    <div style="flex:2;background:var(--pesq)"></div>
    <div style="flex:3;background:var(--exte)"></div>
    <div style="flex:1;background:var(--indi)"></div>
  </div>
  <div class="main">
    <aside class="sb" id="admin-sidebar"></aside>
    <div class="ct"><div id="app"></div></div>
  </div>
</div>

<!-- ── Shell Coordenador ── -->
<div class="shell" id="shell-coordenador">
  <header class="hdr">
    <div class="hl">
      <div class="hlogo">S</div>
      <div><div class="hnm">SOA</div><div class="hcp">IFRS · Campus Rio Grande</div></div>
      <div class="hvd"></div>
      <nav class="pnav" id="coord-topnav">
        <button class="pni on"  data-page="home">🏠 Início</button>
        <button class="pni"     data-page="projetos">📁 Projetos</button>
        <button class="pni"     data-page="inscricoes">✍ Inscrições</button>
        <button class="pni"     data-page="assiduidade">✓ Assiduidade</button>
      </nav>
    </div>
    <div class="hr">
      <div class="huser">
        <div class="hav" id="coord-av" style="background:var(--exte)">CO</div>
        <div><div class="hun" id="coord-nome">Coordenador</div><div class="hperf" style="color:var(--exte)">Coordenador</div></div>
      </div>
    </div>
  </header>
  <div class="cbar">
    <div style="flex:2;background:var(--ensi)"></div>
    <div style="flex:2;background:var(--pesq)"></div>
    <div style="flex:3;background:var(--exte)"></div>
    <div style="flex:1;background:var(--indi)"></div>
  </div>
  <div class="pbody" id="coord-body"></div>
</div>

<!-- ── Shell Aluno ── -->
<div class="shell" id="shell-aluno">
  <header class="hdr">
    <div class="hl">
      <div class="hlogo">S</div>
      <div><div class="hnm">SOA</div><div class="hcp">IFRS · Campus Rio Grande</div></div>
      <div class="hvd"></div>
      <nav class="pnav" id="aluno-topnav">
        <button class="pni on"  data-page="editais">📋 Editais</button>
        <button class="pni"     data-page="inscricoes">✍ Minhas Inscrições</button>
        <button class="pni"     data-page="assiduidade">✓ Assiduidade</button>
      </nav>
    </div>
    <div class="hr">
      <div class="huser">
        <div class="hav" id="aluno-av" style="background:var(--pesq)">AL</div>
        <div><div class="hun" id="aluno-nome">Aluno</div><div class="hperf" style="color:var(--pesq)">Estudante</div></div>
      </div>
    </div>
  </header>
  <div class="cbar">
    <div style="flex:2;background:var(--ensi)"></div>
    <div style="flex:2;background:var(--pesq)"></div>
    <div style="flex:3;background:var(--exte)"></div>
    <div style="flex:1;background:var(--indi)"></div>
  </div>
  <div class="pbody" id="aluno-body"></div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<!-- ── Modal ── -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="mhdr">
      <div><h3 id="modal-titulo"></h3><p id="modal-sub"></p></div>
      <button class="mclose" id="modal-close">✕</button>
    </div>
    <div class="mbody" id="modal-body"></div>
    <div class="mfoot" id="modal-foot"></div>
  </div>
</div>

<!-- ── Scripts — ordem importa ── -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="components/sidebar.js"></script>
<script src="components/modal.js"></script>
<script src="pages/admin/editais.js"></script>
<script src="pages/admin/projetos.js"></script>
<script src="pages/admin/inscricoes.js"></script>
<script src="pages/admin/assiduidade.js"></script>
<script src="pages/admin/logs.js"></script>
<script src="pages/coordenador/home.js"></script>
<script src="pages/coordenador/inscricoes.js"></script>
<script src="pages/coordenador/assiduidade.js"></script>
<script src="pages/aluno/editais.js"></script>
<script src="pages/aluno/inscricoes.js"></script>
<script src="pages/aluno/assiduidade.js"></script>
<script src="js/app.js"></script>

</body>
</html>
